services:
  postgres:
    image: postgres:16-alpine
    container_name: arendahub-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-arendahub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-arendahub}
      POSTGRES_DB: ${POSTGRES_DB:-arendahub}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-arendahub}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - arendahub

  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: arendahub-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      API_PREFIX: api
      DATABASE_URL: postgresql://${POSTGRES_USER:-arendahub}:${POSTGRES_PASSWORD:-arendahub}@postgres:5432/${POSTGRES_DB:-arendahub}?schema=public
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change-me-access}
      JWT_ACCESS_EXPIRES: 15m
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me-refresh}
      JWT_REFRESH_EXPIRES: 7d
      THROTTLE_TTL: 60
      THROTTLE_LIMIT: 120
      BCRYPT_SALT_ROUNDS: 10
      UPLOAD_DIR: uploads
      MAX_FILE_SIZE_MB: 5
    volumes:
      - uploads:/app/uploads
    expose:
      - '4000'
    ports:
      - '4000:4000'
    networks:
      - arendahub

  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Hammasi bitta domen ortida bo'lgani uchun nisbiy /api
        NEXT_PUBLIC_API_URL: /api
    container_name: arendahub-web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NODE_ENV: production
      PORT: 3000
    expose:
      - '3000'
    networks:
      - arendahub

  nginx:
    image: nginx:alpine
    container_name: arendahub-nginx
    restart: unless-stopped
    depends_on:
      - api
      - web
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - uploads:/var/www/uploads:ro
    networks:
      - arendahub

volumes:
  pgdata:
  uploads:

networks:
  arendahub:
    driver: bridge
