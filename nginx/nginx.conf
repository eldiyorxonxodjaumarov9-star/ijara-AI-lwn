upstream arendahub_api {
    server api:4000;
}

upstream arendahub_web {
    server web:3000;
}

# HTTP -> (SSL tayyor bo'lsa HTTPS ga yo'naltirish uchun pastdagi blokni yoqing)
server {
    listen 80;
    server_name _;

    client_max_body_size 10M;

    # API proxy
    location /api/ {
        proxy_pass http://arendahub_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # SSE (real-time notifications) uchun
        proxy_buffering off;
        proxy_read_timeout 3600s;
    }

    # Yuklangan rasmlar
    location /uploads/ {
        alias /var/www/uploads/;
        expires 7d;
        access_log off;
    }

    location /health {
        proxy_pass http://arendahub_api/health;
    }

    location = /api/health {
        proxy_pass http://arendahub_api/health;
    }

    # Frontend (Next.js)
    location / {
        proxy_pass http://arendahub_web;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

